<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>new-title</title>
	<link rel="stylesheet" href="styles.css" />
	<script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
</head>
<body>

	<div class="menu-bar">
		<button class="plain-input" onclick="clearData()">clear</button>
	</div>
	<div id="frame" style="width:100%; height:100vh;"></div>

	<script>
		const vscode = acquireVsCodeApi();
		let symbolLeadsMap = [];
		const grid = new gridjs.Grid({
			columns: [
				"type",
				"leads",
				"fileName",
				"lineNumber",
				"other"
			],
			sort: true,
			data: []
		}).render(document.getElementById("frame"));

		window.addEventListener("message", event => {
			if (event.data.command === "addLead") {
				let newLeads = [];
				for (const lead of event.data.leads) {
					newLeads.push([
						lead.type,
						lead.line,
						lead.fileName,
						lead.lineNumber,
						lead.other
					]);
				}
				symbolLeadsMap.push({ symbol: event.data.symbol, leads: newLeads, symbolID: event.data.symbolID });
				grid.updateConfig({
					data: grid.config.data.concat(newLeads)
				}).forceRender();

			} else if (event.data.command === "hideLeads") {
				const symbolToHide = symbolLeadsMap.findIndex(a => a.symbolID === event.data.symbolID);
				if (symbolToHide < 0) return;	// this handles case where snippet passes in unstored symbols
				symbolLeadsMap.splice(symbolToHide, 1);
				const newData = [];
				for (const symbolData of symbolLeadsMap) {
					for (const lead of symbolData.leads) {
						newData.push(lead);
					}
				}
				grid.updateConfig({
					data: newData
				}).forceRender();
			} else if (event.data.command === "hideAllLeads") {
				symbolLeadsMap = [];
				grid.updateConfig({ data: [] }).forceRender();
			}
		});

		grid.on('rowClick', (...args) => {
			vscode.postMessage({ data: args[1].cells, command: "leadClick" });

			window.addEventListener("message", event => {
				if (event.data.command !== "sendToTop") return;
				
				// move references to top
				for (const i of event.data.ref.reverse()) {
					sendToTop(Object.values(i));
				}
			
				// move selected lead to top
				if (args) {
					let indexingArray = args[1].cells.map(item => item.data);
					sendToTop(indexingArray);
				}

				args = undefined;
			});
		});

		function clearData() {
			grid.updateConfig({ data: [] }).forceRender();
			symbolLeadsMap = [];
			vscode.postMessage({ command: "clear" });
		}

		function sendToTop(indexingArray) {
			for (let i = 0; i < grid.config.data.length; i++) {
				if (JSON.stringify(indexingArray) === JSON.stringify(grid.config.data[i])) {
					grid.updateConfig({
						data: grid.config.data.splice(i, 1).concat(grid.config.data)
					}).forceRender();
					break;
				}
			}
		}
	</script>
	
</body>
</html>
